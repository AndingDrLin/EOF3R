# EOF3R Baseline Registry
# Records all external open-source code used as baselines or dependencies.
#
# Each entry:
#   name:       Short identifier used in code (e.g., "3dgs", "vggt")
#   url:        Git repository URL
#   branch:     Branch cloned
#   commit:     Exact commit hash checked out
#   clone_date: When it was cloned (YYYY-MM-DD)
#   env:        Conda environment name (if separate from main)
#   notes:      Why we chose this baseline, what it's used for
#   patched:    Whether we applied a patch from baselines/patches/

