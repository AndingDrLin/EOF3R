# EOF3R Baseline Registry
# Records all external open-source code used as baselines or dependencies.
#
# Each entry:
#   name:       Short identifier used in code (e.g., "3dgs", "vggt")
#   url:        Git repository URL
#   branch:     Branch cloned
#   commit:     Exact commit hash checked out
#   clone_date: When it was cloned (YYYY-MM-DD)
#   env:        Conda environment name (if separate from main)
#   notes:      Why we chose this baseline, what it's used for
#   patched:    Whether we applied a patch from baselines/patches/

baselines:
  # --- Foreground: 3D Gaussian Splatting ---
  # - name: gaussian-splatting
  #   url: https://github.com/graphdeco-inria/gaussian-splatting
  #   branch: main
  #   commit: null
  #   clone_date: null
  #   env: eof3r-3dgs
  #   notes: Original 3DGS. Used for foreground object reconstruction (optimization fallback).
  #   patched: false

  # --- Background: Feedforward Reconstruction ---
  - name: vggt
    url: https://github.com/facebookresearch/vggt
    branch: main
    commit: a288dd0  # "readme" — main branch head as of 2025-06-18
    clone_date: 2025-06-18
    env: eof3r-vggt
    notes: Feedforward 3D reconstruction (CVPR 2025 Best Paper). Used for background
           coarse geometry estimation (pointmap, camera poses, depth, ground plane).
           Checkpoint: facebook/VGGT-1B on HuggingFace Hub.
    patched: false

  # - name: dust3r
