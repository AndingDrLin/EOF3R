  #   commit: null
  #   clone_date: null
  #   env: eof3r-dust3r
  #   notes: Fallback option for background reconstruction.
  #   patched: false

  # --- Feedforward 3DGS ---
  - name: mvsplat
    url: https://github.com/donydchen/mvsplat
    branch: main
    commit: 01f9a28  # "Update README.md" — main branch head as of clone
    clone_date: null
    env: mvsplat
    notes: Feedforward 3DGS via cost volume. Primary choice for foreground Gaussian occupancy.
           Checkpoints: checkpoints/re10k.ckpt, checkpoints/acid.ckpt
    patched: false

  - name: depthsplat
    url: https://github.com/chengzg/depthsplat  # actual URL may differ — verify
    branch: main
    commit: 2dad25a  # "Add ReSplat update"
    clone_date: null
    env: depthsplat
    notes: DepthSplat variant. Available as backup for foreground module.
           NOT registered in e2e pipeline yet.
    patched: false

  # --- Enhanced 3R Models ---
  # - name: mast3r
  #   url: https://github.com/naver/mast3r
  #   branch: main
  #   commit: null
  #   clone_date: null
  #   env: eof3r-mast3r
  #   notes: DUSt3R + feature matching. Enhanced option for background reconstruction and pose estimation.
  #   patched: false

  # --- Segmentation ---
  - name: sam2
    url: https://github.com/facebookresearch/sam2
    branch: main
    commit: 2b90b9f  # "remove .pin_memory() ..." — main branch head as of 2025-06-18
    clone_date: 2025-06-18
    env: eof3r
    notes: Segment Anything Model 2. Used for foreground object segmentation.
           Install: pip install -e baselines/sam2/ after satisfying torch>=2.5.1.
           Checkpoints loaded via HuggingFace (facebook/sam2-hiera-{tiny,small,base+,large}).
    patched: false

